<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      BLOQUE SEO POR RUTA: el plugin de prerender (vite.config.ts -> taborda:prerender-seo)
      reemplaza TODO lo que hay entre SEO:START / SEO:END en el build, generando un HTML
      estatico por ruta (dist/blog/<slug>/index.html, etc.). Asi los crawlers que NO
      ejecutan JS (Facebook, WhatsApp, LinkedIn, X) reciben meta + OG + JSON-LD correctos.
    -->
    <!--SEO:START-->
    <title>TABORDA SYSTEM — El Sistema Operativo de Disciplina | Carlos Taborda</title>
    <meta name="description" content="TABORDA SYSTEM es el sistema operativo de disciplina que instalas en tu vida: protocolos ejecutables, métricas diarias y consecuencias reales. La motivación se agota. El sistema se ejecuta. Construido públicamente por Carlos Taborda." />
    <meta name="keywords" content="disciplina, disciplina extrema, productividad extrema, arquitectura de conducta, hábitos, dejar adicciones, productividad, desarrollo personal masculino, gym, dopamina, deep work, hábitos atómicos, sistema operativo personal, mejorar tu vida, mentalidad, transformación personal" />
    <link rel="canonical" href="https://tabordasystem.com/" />
    <meta name="theme-color" content="#0a0e0a" />
    <meta property="og:title" content="TABORDA SYSTEM — El Sistema Operativo de Disciplina" />
    <meta property="og:description" content="Deja de consumir motivación. Instala un sistema operativo de disciplina con protocolos, métricas y consecuencias reales." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tabordasystem.com" />
    <meta property="og:locale" content="es_CO" />
    <meta property="og:site_name" content="TABORDA SYSTEM" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TABORDA SYSTEM — Carlos Taborda" />
    <meta name="twitter:description" content="El sistema operativo de disciplina. Ejecución documentada públicamente." />
    <meta property="og:image" content="https://tabordasystem.com/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:image" content="https://tabordasystem.com/og-cover.png" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Carlos Taborda",
      "url": "https://tabordasystem.com",
      "sameAs": ["https://www.tiktok.com/@carlostaho"],
      "jobTitle": "Fundador de TABORDA SYSTEM (Disciplina Fénix)",
      "knowsAbout": ["disciplina", "hábitos", "accountability"]
    }
    </script>
    <!--SEO:END-->
    <link rel="alternate" type="application/rss+xml" title="Blog - TABORDA SYSTEM" href="/rss.xml" />
    <!-- Fuentes: resolución DNS temprana + conexión anticipada al CDN de Google.
         dns-prefetch para navegadores viejos; preconnect para abrir el socket TLS
         antes de pedir el CSS. gstatic sirve los .woff2 con CORS => crossorigin.
         Pesos recortados a los que usa el diseño (400/500/700, sin itálicas) y
         display=swap para eliminar el flash de texto invisible (FOIT). -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
